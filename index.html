<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload Bot</title>
  <style>
    body { font-family: monospace; background: #111; color: #eee; padding: 40px; }
    #code-box {
      display: none;
      background: #1a1a1a;
      border: 3px solid #00ff88;
      border-radius: 12px;
      padding: 40px;
      margin: 40px 0;
      text-align: center;
    }
    #code-box h2 { color: #00ff88; font-size: 28px; margin-bottom: 20px; }
    #code-value {
      font-size: 22px;
      font-weight: bold;
      color: #ffff00;
      background: #000;
      padding: 20px;
      border-radius: 8px;
      word-break: break-all;
      letter-spacing: 1px;
    }
    #copy-btn {
      margin-top: 20px;
      padding: 12px 32px;
      font-size: 18px;
      background: #00ff88;
      color: #000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #copy-btn:hover { background: #00cc66; }
    #copied-msg { color: #00ff88; margin-top: 10px; font-size: 18px; }
    .links { margin-top: 40px; }
    .links a { color: #88aaff; margin-right: 20px; }
  </style>
</head>
<body>
  <h1 style="color:#00ff88">Upload Bot</h1>

  <div id="code-box">
    <h2>✅ Facebook Authorization Code</h2>
    <div id="code-value"></div>
    <button id="copy-btn" onclick="copyCode()">📋 Copy Code</button>
    <div id="copied-msg"></div>
    <p style="color:#aaa;margin-top:20px">Authorization complete. You can close this tab.</p>
  </div>

  <div class="links">
    <a href="privacy-policy.html">Privacy Policy</a>
    <a href="terms-of-service.html">Terms of Service</a>
  </div>

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var code = params.get('code');
      if (code) {
        var box = document.getElementById('code-box');
        var val = document.getElementById('code-value');
        box.style.display = 'block';
        val.textContent = code;
        document.title = 'CODE: ' + code.slice(0, 20);
      }
    })();

    function copyCode() {
      var code = document.getElementById('code-value').textContent;
      navigator.clipboard.writeText(code).then(function() {
        document.getElementById('copied-msg').textContent = '✓ Copied!';
        setTimeout(function(){ document.getElementById('copied-msg').textContent = ''; }, 2000);
      });
    }
  </script>
</body>
</html>
